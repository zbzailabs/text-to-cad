name: Test

on:
  workflow_dispatch:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop

jobs:
  version:
    name: Version Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check release version
        run: |
          scripts/release/check-version.sh
          node scripts/release/sync-version.mjs --check

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check development layout
        if: github.ref_name == 'develop' || github.base_ref == 'develop'
        run: scripts/github-workflows/check-symlinks.sh

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Install Node dependencies
        run: |
          npm ci --prefix packages/cadjs
          npm ci --prefix packages/implicitjs
          npm ci --prefix viewer
          npm ci --prefix docs

      - name: Check production bundle layout
        if: github.ref_name == 'main' || github.base_ref == 'main'
        run: scripts/github-workflows/check-builds.sh

      - name: Run code tests
        run: scripts/test/test.sh

  production-bundle:
    name: Production Bundle
    if: github.ref_name == 'develop' || github.base_ref == 'develop'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check development layout
        run: scripts/github-workflows/check-symlinks.sh

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Install Node dependencies
        run: |
          npm ci --prefix packages/cadjs
          npm ci --prefix packages/implicitjs
          npm ci --prefix viewer
          npm ci --prefix docs

      - name: Bundle production outputs
        run: scripts/bundle/bundle.sh --clean

      - name: Check production bundle layout
        run: scripts/github-workflows/check-builds.sh --skip-bundle-check

      - name: Run documentation checks
        run: scripts/test/test-docs.sh

      - name: Run code tests
        run: scripts/test/test.sh
